<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN"
        "http://www.w3.org/TR/html4/strict.dtd">
<html lang="ja">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <meta http-equiv="content-style-type" content="text/css">
    <link rel="stylesheet" href="{{.ThemeCSS}}" type="text/css" media="all">
    <title>let me see...</title>
  </head>
  <body>
    {{.Header}}
    <form method="get" action="{{.IndexURL}}">
      <div>
        <input name="query" size="20" value="{{.Query}}">
        <input type="submit" value="検索">
        検索方法：
        <select name="mode">
          <option value="exactsearch"{{if eq .Mode "exactsearch"}} selected{{end}}>完全一致</option>
          <option value="search"{{if eq .Mode "search"}} selected{{end}}>前方一致</option>
          <option value="endsearch"{{if eq .Mode "endsearch"}} selected{{end}}>後方一致</option>
          <option value="keywordsearch"{{if eq .Mode "keywordsearch"}} selected{{end}}>条件検索</option>
          <option value="menu">メニュー</option>
          <option value="copyright">著作権表示</option>
        </select>
        　辞書毎の最大ヒット数：
        <select name="maxhit">
          <option{{if eq .MaxHit 10}} selected{{end}} value="10">10</option>
          <option{{if eq .MaxHit 20}} selected{{end}} value="20">20</option>
          <option{{if eq .MaxHit 50}} selected{{end}} value="50">50</option>
        </select>
      </div>
      <p>辞書一覧</p>
      <table cellpadding="0" width="100%">
        {{range .DictRows}}
        <tr>
          {{range .}}
          <td>{{if .Valid}}
            <input type="checkbox" name="dict" value="{{.Index}}"{{if .Checked}} checked{{end}}>{{.Title}}
          {{end}}</td>
          {{end}}
        </tr>
        {{end}}
      </table>
